<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Своя Игра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="screen">
        <h1>Своя Игра</h1>
        <div class="setup-box">
            <label>Количество команд (2-5):</label>
            <input type="number" id="team-count" min="2" max="5" value="2">
            <div id="team-names-inputs"></div>
            <button onclick="startGame()">Начать игру</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <header>
            <div id="turn-indicator">Ход команды: <span id="current-team-name">-</span></div>
            <div id="scoreboard"></div>
        </header>
        
        <div id="game-board" class="grid-container"></div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-category"></h2>
            <p id="modal-question"></p>
            <div id="answer-section" class="hidden">
                <hr>
                <p id="modal-answer"></p>
                <div class="admin-buttons">
                    <button class="btn-correct" onclick="processResult(true)">Верно ✅</button>
                    <button class="btn-wrong" onclick="processResult(false)">Неверно ❌</button>
                </div>
            </div>
            <button id="show-answer-btn" onclick="showAnswer()">Показать ответ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
